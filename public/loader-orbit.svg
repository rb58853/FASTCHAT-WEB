<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="160" height="160" rx="40" fill="#F2FBF6"/>
  <circle cx="80" cy="80" r="34" stroke="#D8F0E2" stroke-width="10"/>
